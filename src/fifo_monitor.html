<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能分拣监控 · FIFO 动画与统计</title>
  <style>
    :root{--bg:#f4f7fb;--panel:#fff;--line:#d8e3f1;--text:#1f2937;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--orange:#f59e0b;--red:#ef4444;--purple:#7c3aed}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
    header{padding:16px 20px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
    header h1{margin:0;font-size:20px}header p{margin:4px 0 0;font-size:13px;color:var(--muted)}
    header a{color:var(--blue);font-size:13px;text-decoration:none}
    .wrap{padding:12px 20px 24px;display:grid;gap:12px}
    .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;align-items:end}
    label{display:grid;gap:4px;font-size:12px;color:var(--muted)}
    input,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:14px}
    button{border:0;border-radius:10px;padding:9px 14px;font-weight:700;cursor:pointer;color:#fff;background:var(--blue)}
    button.secondary{background:#64748b}button.good{background:var(--green)}button.warn{background:#d97706}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
    .stat .n{font-size:11px;color:var(--muted)}.stat .v{font-size:22px;font-weight:800;margin-top:2px}
    .stat .hint{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.25}
    .grid{display:grid;grid-template-columns:1fr 380px;grid-template-areas:"scene side" "log log";gap:12px;align-items:start}
    @media(max-width:1200px){.grid{grid-template-columns:1fr;grid-template-areas:"scene" "side" "log"}}
    .panel.scene-wrap{grid-area:scene;min-width:0}
    .side-col{grid-area:side;display:grid;gap:12px;align-content:start}
    .log-panel{grid-area:log;margin:0}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;overflow:hidden}
    .panel h2{margin:0 0 10px;font-size:15px}
    .scene-wrap{overflow:visible}
    .scene-wrap canvas{display:block;width:100%;max-width:1740px;height:auto;background:#f8fafc;border:1px solid #dbe5f3;border-radius:10px}
    .scene-caption{margin:8px 0 0;font-size:11px;color:var(--muted);line-height:1.4}
    canvas{display:block;background:#f8fafc;border:1px solid #dbe5f3;border-radius:10px}
    .log{height:200px;overflow:auto;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:8px;font:12px/1.5 Consolas,monospace;width:100%}
    .demand-card{border:1px solid #bfdbfe;border-radius:10px;padding:8px 10px;margin-bottom:8px;background:#eff6ff;font-size:12px}
    .demand-card.active{border-color:var(--green);background:#ecfdf5}
    .demand-scroll{max-height:320px;overflow-y:auto}
    .spec-group{font-weight:700;font-size:12px;margin:10px 0 4px;padding-top:4px;border-top:1px solid #e5edf7}
    .spec-group:first-child{border-top:0;margin-top:0}
    .demand-addr{font-family:Consolas,monospace;font-weight:700;color:#1d4ed8;margin:4px 0}
    .pill{display:inline-block;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700}
    .pill.good{background:#dcfce7;color:#166534}.pill.warn{background:#fef3c7;color:#92400e}.pill.info{background:#dbeafe;color:#1e40af}
    .result-line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e5edf7;font-size:12px}
    .box-station-legend{display:flex;flex-wrap:wrap;gap:6px 10px;margin-bottom:10px;font-size:10px;color:var(--muted)}
    .box-station-legend span{display:inline-flex;align-items:center;gap:4px}
    .box-station-legend i{display:inline-block;width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.08)}
    .box-station-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
    .box-station-grid:last-child{margin-bottom:0}
    .box-station-mod{font-size:11px;font-weight:700;color:var(--muted);margin:8px 0 4px}
    .box-station-mod:first-child{margin-top:0}
    .box-station-item{border:1.5px solid var(--line);border-radius:8px;padding:5px 4px;text-align:center;min-height:54px;display:flex;flex-direction:column;justify-content:center;gap:2px;transition:background .15s,border-color .15s}
    .box-station-item .spec{font-weight:700;font-size:11px;line-height:1.1}
    .box-station-item .phase{font-size:10px;font-weight:600;line-height:1.1}
    .box-station-item .detail{font-size:9px;opacity:.85;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .box-station-item .fill-bar{height:4px;background:rgba(0,0,0,.07);border-radius:2px;overflow:hidden;margin:2px 4px 0}
    .box-station-item .fill-bar div{height:100%;border-radius:2px;transition:width .2s}
    .box-station-item.st-idle{background:#f8fafc;border-color:#cbd5e1;color:#64748b}
    .box-station-item.st-idle .fill-bar div{background:#94a3b8}
    .box-station-item.st-wait{background:#fef9c3;border-color:#facc15;color:#854d0e}
    .box-station-item.st-wait .fill-bar div{background:#eab308}
    .box-station-item.st-incoming{background:#ffedd5;border-color:#fb923c;color:#9a3412}
    .box-station-item.st-incoming .fill-bar div{background:#f97316}
    .box-station-item.st-filling{background:#dbeafe;border-color:#3b82f6;color:#1e40af}
    .box-station-item.st-filling .fill-bar div{background:#2563eb}
    .box-station-item.st-sealing{background:#ede9fe;border-color:#8b5cf6;color:#5b21b6}
    .box-station-item.st-sealing .fill-bar div{background:#7c3aed}
    #moduleState{max-height:480px;overflow-y:auto;padding-right:2px}
    .inlet-banner{background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;padding:10px;font-size:12px;margin-bottom:10px}
    .bar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden}.bar div{height:100%;background:var(--blue);width:0}
    .view-tabs{display:flex;gap:6px;flex-wrap:wrap}
    .view-tab{border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;background:#f8fafc;color:var(--muted)}
    .view-tab.active{background:var(--blue);border-color:var(--blue);color:#fff}
    #statsView{display:none;padding:0 20px 24px}
    #statsView.active{display:block}
    #statsFrame{width:100%;min-height:calc(100vh - 88px);border:0;border-radius:14px;background:var(--panel)}
    #fifoView.hidden{display:none}
    .spec-enable{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 12px}
    .spec-enable h2{margin:0 0 8px;font-size:14px}
    .spec-mod-group{display:flex;flex-wrap:wrap;gap:6px 10px;align-items:center;margin-bottom:6px}
    .spec-mod-group:last-child{margin-bottom:0}
    .spec-mod-label{font-size:11px;font-weight:700;color:var(--muted);min-width:18px}
    .spec-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 9px;border-radius:8px;border:1px solid var(--line);cursor:pointer;background:#f8fafc;color:#64748b;user-select:none}
    .spec-chip.on{background:#dbeafe;border-color:#3b82f6;color:#1e40af;font-weight:700}
    .spec-chip input{display:none}
    .box-station-item.st-disabled{background:#f1f5f9;border-color:#e2e8f0;color:#94a3b8;opacity:.55}
  </style>
</head>
<body>
<header>
  <div>
    <h1>智能分拣监控</h1>
    <p>FIFO 动画与统计面板同页切换 · 不跳转页面，动画状态保持</p>
  </div>
  <nav class="view-tabs" aria-label="视图切换">
    <button type="button" class="view-tab active" id="tabBtnFifo">FIFO 动画</button>
    <button type="button" class="view-tab" id="tabBtnStats">统计监控</button>
  </nav>
</header>
<div id="fifoView">
<main class="wrap">
  <section class="controls">
    <label>随机种子<input id="seedInput" type="number" value="42"></label>
    <label>结束条件<select id="stopMode"><option value="count">按条数</option><option value="weight">按总重(吨)</option></select></label>
    <label id="stopCountWrap">目标条数<input id="totalFish" type="number" value="25000" min="1"></label>
    <label id="stopWeightWrap" style="display:none">目标总重(吨)<input id="totalTons" type="number" value="10" min="0.1" step="0.1"></label>
    <label>速度<input id="speedInput" type="number" value="8" min="1" max="500"></label>
    <label>料道扩容(+N)<input id="capacityFactor" type="number" value="1" min="1" title="三合一合计 = min(装箱尾数) + N"></label>
    <label>队首超时(s)<input id="headTimeout" type="number" value="0"></label>
    <label>显示模式<select id="drawMode"><option value="normal">正常</option><option value="light">轻量</option></select></label>
    <button class="good" id="startBtn">开始</button>
    <button class="secondary" id="pauseBtn">暂停</button>
    <button class="warn" id="fastBtn">快速跑完</button>
    <button class="secondary" id="resetBtn">重置</button>
  </section>
  <section class="spec-enable">
    <!-- 小/中/大克数区间：plan/细分规则.py → Scheduler_Engine BUCKET_RANGES → GET /api/config bucket_ranges；见 script 顶部注释 -->
    <h2>启用规格 <span style="font-size:11px;color:var(--muted);font-weight:400">未启用批次灰色显示且不生成；小中大区间与细分规则同步，启动日志可查看示例克数</span></h2>
    <div id="specToggles"></div>
  </section>
  <section class="stats">
    <div class="stat"><div class="n">累计来鱼 / 总重</div><div class="v" id="sInput">0</div><div class="hint" id="sInputHint">0 条 · 0.000 t</div></div>
    <div class="stat"><div class="n">完成箱数</div><div class="v" id="sCartons">0</div></div>
    <div class="stat"><div class="n">定向推送</div><div class="v" id="sDirect">0</div></div>
    <div class="stat"><div class="n">在制品</div><div class="v" id="sWip">0</div></div>
    <div class="stat"><div class="n">暂存箱</div><div class="v" id="sStorage">0</div><div class="hint" id="sStorageHint">0 / 150 · 需求匹配</div></div>
    <div class="stat"><div class="n">回流/尾料</div><div class="v" id="sReflow">0</div><div class="hint" id="sReflowHint">等待开始</div></div>
    <div class="stat"><div class="n">活跃需求</div><div class="v" id="sDemand">0</div></div>
  </section>
  <div class="bar"><div id="progressBar"></div></div>
  <section class="grid">
    <div class="panel scene-wrap">
      <canvas id="scene" width="1740" height="1475"></canvas>
      <p class="scene-caption">小中大区间：plan/细分规则.py · 三合一容量=min(装箱尾数)+扩容 · 单路≈合计÷3 · DFS 封箱 · 暂存箱兜底</p>
    </div>
    <aside class="side-col">
      <div class="panel">
        <h2>进料口 · 当前需求广播</h2>
        <div class="inlet-banner" id="inletBanner">等待开始…</div>
        <h2>需求地址列表 <span id="demandHint" style="font-size:11px;color:#64748b;font-weight:400"></span></h2>
        <div class="demand-scroll" id="demandPanel"></div>
      </div>
      <div class="panel">
        <h2>装箱工位状态</h2>
        <div id="moduleState"></div>
      </div>
    </aside>
    <div class="panel log-panel">
      <h2>运行日志</h2>
      <div class="log" id="log"></div>
    </div>
  </section>
</main>
</div>
<div id="statsView">
  <iframe id="statsFrame" title="智能分拣系统 · 可视化监控" loading="lazy"></iframe>
</div>
<script>
'use strict';
/*
 * =============================================================================
 * 小 / 中 / 大 重量区间 — 定义位置与调整方法
 * =============================================================================
 *
 * 【权威算法】plan/细分规则.py
 *   - calc_mid_bucket()：用主力尾数 primary_count 锚定「中区」
 *       mid_lo = ceil(TARGET_MIN / primary_count)
 *       mid_hi = floor(TARGET_MAX / primary_count)
 *   - calc_bucket_split()：在规格 range 内切三段
 *       小: [spec_lo, mid_lo - 1]
 *       中: [mid_lo, mid_hi]        ← 保证 primary_count 尾能凑满 4980~5030g
 *       大: [mid_hi + 1, spec_hi]
 *   - bucket_of(weight, buckets)：按重量归入 small / medium / large
 *
 * 【后端预计算】src/Scheduler_Engine.py 启动时
 *   - 对每个规格调用 calc_bucket_split(range, primary_count=counts 中间项)
 *   - 结果存入 BUCKET_RANGES，入料/封箱/回流均用 classify_bucket()
 *
 * 【本页动画】禁止自行三等分规格！须与后端一致：
 *   - 启动时 GET /api/config → bucket_ranges（与 BUCKET_RANGES 相同）
 *   - bucketOf(spec, weight) 读取 BUCKET_RANGES[spec] 判段
 *   - 画面料道名 light/mid/heavy 仅 UI 别名，对应规则 small/medium/large
 *
 * 【若要改区间】只改 plan/细分规则.py（或 SPEC 的 counts/range），重启 web_server；
 *   刷新本页后会重新拉取 bucket_ranges。勿在本文件写死克数分界。
 * =============================================================================
 */
const TARGET_MIN=4980,TARGET_MAX=5030,TARGET_MID=5005;
const SPECS={"15p":{range:[566,700],counts:[7,8]},"20p":{range:[446,565],counts:[10,11]},"25p":{range:[366,445],counts:[12,13,14]},"30p":{range:[306,365],counts:[15,16]},"35p":{range:[266,305],counts:[17,18,19]},"40p":{range:[231,265],counts:[20,21]},"45p":{range:[211,230],counts:[22,23]},"50p":{range:[183,210],counts:[25,26]},"60p":{range:[153,182],counts:[30,31]},"70p":{range:[133,152],counts:[35,36]},"80p":{range:[116,132],counts:[40,41]},"90p":{range:[106,115],counts:[45,46]},"100p":{range:[96,105],counts:[50,51]},"110p":{range:[87,95],counts:[55,56]},"120p":{range:[80,86],counts:[60,61]},"130p":{range:[74,79],counts:[65,66]},"140p":{range:[69,73],counts:[70,71]},"150p":{range:[65,68],counts:[75,76]}};
const MODULE_SPECS={A:["15p","20p","25p","30p","35p","40p"],B:["45p","50p","60p","70p","80p","90p"],C:["100p","110p","120p","130p","140p","150p"]};
const ALL_SPECS=Object.values(MODULE_SPECS).flat();
const MODULE_COLOR={A:'#16a34a',B:'#2563eb',C:'#7c3aed'};
/** 动画/UI 区段名 → 细分规则.py 中的 BucketName */
const RULE_BUCKET_TO_UI={small:'light',medium:'mid',large:'heavy'};
/** UI 区段名 → 规则名（读 BUCKET_RANGES 时用） */
const UI_BUCKET_TO_RULE={light:'small',mid:'medium',heavy:'large'};
const BUCKET_COLOR={light:'#7dd3fc',mid:'#86efac',heavy:'#fbbf24'};
/** 料道 FIFO 三路：light=小, mid=中, heavy=大 */
const BUCKETS=['light','mid','heavy'];
/** 由 /api/config.bucket_ranges 注入：{ "15p": { small:[566,621], medium:[622,628], large:[629,700] }, ... } */
let BUCKET_RANGES={};
const FEED_TRACK={x:492,w:58,top:95,bottom:1395};
const STORAGE_BOX={x:118,y:200,w:248,h:720,outX:366,outY:120};
let canvas,ctx,running=false,lastTs=0,beltPhase=0,spawnTimer=0,simTime=0,cartonSeq=0;
let movingFish=[],lanes={},laneList=[],modules={},finished=false;
let batchFish=[],batchIndex=0,batchLoaded=false;
let stats={input:0,cartons:0,directRoute:0,outsideTail:0,fifoReflow:0,batchTail:0,overflow:0,timeout:0};
let currentInletDemand=null;
let syncPollTimer=null,serverFinishedHandled=false,serverSessionKey='';
let syncPollState=null;
let serverInputCount=0,serverInputWeight=0,serverStopMode='count',serverStopTargetCount=25000,serverStopTargetTons=10;
let intakeSynced=false;
let serverDemands=null,serverInletDemand=null,serverDemandTick=0;
let serverModules=null;
let pollCursor={since_carton:0,since_timeout_tail:0,since_overflow_reflow:0};
let pollSessionSeed=null;
let lastMergedState=null;
let boxSealTimers={};
/** 与 GET /api/state 对齐的回流/尾料分项；null 表示无后端会话，回退本地动画计数 */
let serverReflowStats=null,serverStorageStats=null,serverCapFactor=null;
let activeView='fifo',statsFrameLoaded=false;
let enabledSpecs=new Set(['15p','20p','25p','30p','35p','40p']);
function isSpecEnabled(spec){return enabledSpecs.has(spec)}
function getEnabledSpecs(){return ALL_SPECS.filter(s=>enabledSpecs.has(s))}
function enabledSpecsQuery(){return '&enabled_specs='+encodeURIComponent(getEnabledSpecs().join(','))}
function setEnabledSpecs(list){
  enabledSpecs=new Set((list||[]).filter(s=>ALL_SPECS.includes(s)));
  if(!enabledSpecs.size)enabledSpecs=new Set(['15p','20p','25p','30p','35p','40p']);
  try{sessionStorage.setItem('enabled_specs',JSON.stringify(getEnabledSpecs()))}catch(e){}
  refreshSpecToggleUI();
}
function refreshSpecToggleUI(){
  document.querySelectorAll('.spec-chip').forEach(chip=>{
    const spec=chip.dataset.spec;
    const on=isSpecEnabled(spec);
    chip.classList.toggle('on',on);
    const inp=chip.querySelector('input');
    if(inp)inp.checked=on;
  });
}
function buildSpecToggles(){
  const root=$('specToggles');
  root.innerHTML='';
  for(const mod of Object.keys(MODULE_SPECS)){
    const g=document.createElement('div');
    g.className='spec-mod-group';
    const label=document.createElement('span');
    label.className='spec-mod-label';
    label.textContent=mod;
    g.appendChild(label);
    for(const spec of MODULE_SPECS[mod]){
      const chip=document.createElement('label');
      chip.className='spec-chip'+(isSpecEnabled(spec)?' on':'');
      chip.dataset.spec=spec;
      chip.innerHTML='<input type="checkbox" data-spec="'+spec+'"><span>'+specName(spec)+'</span>';
      chip.onclick=e=>{
        e.preventDefault();
        if(running||finished){log('运行中无法切换启用规格');return}
        if(enabledSpecs.has(spec)&&enabledSpecs.size<=1){log('至少保留一个启用规格');return}
        if(enabledSpecs.has(spec))enabledSpecs.delete(spec);else enabledSpecs.add(spec);
        refreshSpecToggleUI();
        reloadBatchForEnabledSpecs();
      };
      g.appendChild(chip);
    }
    root.appendChild(g);
  }
}
function invalidateBatch(){
  batchLoaded=false;
  batchFish=[];
  batchIndex=0;
  serverSessionKey='';
}
async function reloadBatchForEnabledSpecs(){
  if(running||finished){log('运行中无法切换启用规格');return}
  invalidateBatch();
  log('启用规格已变更，点击「开始」后按新规格生成批次');
  updateUI();
  draw();
}
function setActiveView(view){
  activeView=view;
  const fifo=$('fifoView'),stats=$('statsView');
  $('tabBtnFifo').classList.toggle('active',view==='fifo');
  $('tabBtnStats').classList.toggle('active',view==='stats');
  fifo.classList.toggle('hidden',view!=='fifo');
  stats.classList.toggle('active',view==='stats');
  if(view==='stats'){
    const frame=$('statsFrame');
    if(!statsFrameLoaded){
      frame.src='/?embed=1';
      statsFrameLoaded=true;
    }
  }
}

async function apiJson(path,body){
  const opt=body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{};
  const res=await fetch(path,opt);
  return res.json();
}

async function ensureBatchForSession(seed,total){
  const key=seed+'_'+total+'_'+getStopMode()+'_'+getStopTargetKey()+'_'+getEnabledSpecs().join(',');
  if(batchLoaded&&serverSessionKey===key)return;
  $('seedInput').value=seed;
  await loadBatch(total);
  serverSessionKey=key;
}

function spawnBatchRow(row){
  if(row.outside||!row.spec){
    spawnOutside({outside:true,weight:row.weight,id:row.id});
    log('规格外 #'+row.id+' '+row.weight+'g');
    return;
  }
  if(!isSpecEnabled(row.spec)){
    spawnOutside({outside:true,weight:row.weight,id:row.id});
    log('未启用规格 '+specName(row.spec)+' #'+row.id+' '+row.weight+'g → 尾料轨');
    return;
  }
  const item={spec:row.spec,weight:row.weight,id:row.id};
  currentInletDemand=getInletDemandForUI();
  const demand=findMatchingDemand(item);
  if(demand)routeToAddress(item,demand);
  else spawnNormal(item);
}

function syncIntakePosition(target,allowSkip){
  serverInputCount=target;
  stats.input=target;
  if(allowSkip&&!intakeSynced&&target>batchIndex){
    batchIndex=target;
    intakeSynced=true;
  }
}

function syncServerStorageStats(state){
  if(!state||(state.status==='idle'&&!state.running&&!state.finished)){
    serverStorageStats=null;
    return;
  }
  const box=state.storage_box||{};
  serverStorageStats={
    count:box.count??0,
    capacity:box.capacity??150,
    bySpec:box.by_spec||{},
    storageIn:state.storage_in??0,
    storagePacked:state.storage_packed??0,

function resetPollCursor(){

function mergePollState(delta){
  if(!delta)return null;
  if(delta.status==='idle'&&!delta.running){
    resetPollCursor();
    return delta;
  }
  const seedChanged=delta.seed!=null&&pollSessionSeed!=null&&delta.seed!==pollSessionSeed;
  const fullReset=!delta.snapshot_delta||!lastMergedState||seedChanged;
  if(fullReset){
    pollSessionSeed=delta.seed??pollSessionSeed;
    lastMergedState=Object.assign({},delta,{
      carton_records:delta.carton_records||[],
      timeout_tail_log:delta.timeout_tail_log||[],
      overflow_reflow_log:delta.overflow_reflow_log||[],
    });
    syncModuleFinishedFromState(lastMergedState);
  }else{
    lastMergedState=Object.assign({},delta,{
      carton_records:(lastMergedState.carton_records||[]).concat(delta.carton_records||[]),
      timeout_tail_log:(lastMergedState.timeout_tail_log||[]).concat(delta.timeout_tail_log||[]),
      overflow_reflow_log:(lastMergedState.overflow_reflow_log||[]).concat(delta.overflow_reflow_log||[]),
    });
  }
  pollCursor.since_carton=delta.carton_total??lastMergedState.cartons??0;
  pollCursor.since_timeout_tail=delta.timeout_tail_total??pollCursor.since_timeout_tail;
  pollCursor.since_overflow_reflow=delta.overflow_reflow_total??pollCursor.since_overflow_reflow;
  if(delta.seed!=null)pollSessionSeed=delta.seed;
  return lastMergedState;
}

function syncModuleFinishedFromState(state){
  if(!state)return;
  for(const k of Object.keys(modules))modules[k].box.finished=0;
  for(const rec of (state.carton_records||[])){
    const modKey=moduleOfSpec(rec.spec);
    if(modules[modKey])modules[modKey].box.finished++;
  }
  if((state.carton_records||[]).length)cartonSeq=Math.max(cartonSeq,state.carton_total||0);
}

function handleNewCartons(records){
  if(!records||!records.length)return;
  for(const rec of records){
    const spec=rec.spec;
    const modKey=moduleOfSpec(spec);
    const m=modules[modKey];
    if(!m)continue;
    boxSealTimers[spec]={until:simTime+0.85,count:rec.count,weight:rec.weight,spec};
    m.busy=true;
    m.plan={spec:spec,count:rec.count,weight:rec.weight,parts:rec.parts||{}};
    m.box.phase='sealing';
    m.box.sealTimer=0.85;
    m.box.count=rec.count;
    m.box.weight=rec.weight;
    m.box.finished+=1;
    if(rec.seq!=null)cartonSeq=Math.max(cartonSeq,rec.seq);
    log('完成箱 #'+String(rec.seq||cartonSeq).padStart(4,'0')+'：'+specName(spec)+' '+rec.count+'尾/'+rec.weight+'g');
  }
}

async function applyServerState(state,allowSkip){
  if(!state||(state.status==='idle'&&!state.running)||(!state.running&&!state.finished&&!state.paused)){
    running=false;
    if(!state||state.status==='idle'||(!state.running&&!state.finished)){
      if(!state||state.status==='idle'){
        finished=false;serverFinishedHandled=false;intakeSynced=false;
        serverDemands=null;serverInletDemand=null;serverDemandTick=0;
        serverModules=null;serverReflowStats=null;serverStorageStats=null;serverCapFactor=null;
        resetPollCursor();
      }
    }
    if(state&&state.input_count!=null)syncIntakePosition(state.input_count,false);
    syncRunProgressFromState(state);
    syncServerReflowStats(state);
    return;
  }
  const seed=state.seed!=null?state.seed:Number($('seedInput').value||42);
  syncStopSettingsFromState(state);
  syncRunProgressFromState(state);
  const batchTotal=state.batch_total||getBatchTotal();
  await ensureBatchForSession(seed,batchTotal);
  finished=!!state.finished;
  if(state.paused){
    running=false;
  }else if(state.running&&!state.finished){
    running=true;
    scheduleSpeedSync();
  }else if(state.finished){
    const localDone=batchIndex>=(state.input_count||0)&&!movingFish.length;
    running=!localDone;
  }else{
    running=false;
  }
  if(state.demands){
    serverDemands=state.demands;
    serverInletDemand=state.inlet_demand||null;
    serverDemandTick=state.tick||0;
  }
  syncServerModules(state);
  if(state.cartons!=null)stats.cartons=state.cartons;
  syncServerReflowStats(state);
  syncIntakePosition(state.input_count||0,!!allowSkip);
  if(state.enabled_specs&&state.enabled_specs.length&&!running&&!finished)setEnabledSpecs(state.enabled_specs);
  if(state.finished&&!serverFinishedHandled){
    serverFinishedHandled=true;
    if(allowSkip)batchIndex=state.input_count||batchIndex;
    intakeSynced=true;
    let tail=0;for(const lane of laneList)tail+=lane.queue.length;
    stats.batchTail=tail;
    log('批末完成（与统计面板同步）：'+formatProgressHint(state.input_count||0,state.input_weight||0,state));
  }
  if(!state.finished)serverFinishedHandled=false;
}

function pollIntervalMs(state){
  if(!state||(state.status==='idle'&&!state.running))return 2000;
  if(state.finished)return 400;
  return 800;
}

function scheduleSyncPoll(state){
  syncPollState=state||syncPollState;
  if(syncPollTimer)clearTimeout(syncPollTimer);
  syncPollTimer=setTimeout(async function tick(){
    try{await pollServerState()}catch(e){console.error(e)}
    scheduleSyncPoll(syncPollState);
  },pollIntervalMs(syncPollState));
}

async function pollServerState(){
  try{
    const delta=await apiJson(statePollUrl());
    const state=mergePollState(delta);
    syncPollState=state;
    if(delta.snapshot_delta){
      handleNewCartons(delta.carton_records||[]);
    }
    await applyServerState(state,false);
    updateUI();
  }catch(e){console.error(e)}
}

function startSyncPoll(){
  if(syncPollTimer)clearTimeout(syncPollTimer);
  syncPollState=null;
  scheduleSyncPoll(null);
  pollServerState();
}

/**
 * 按重量归入小/中/大料道（与 Scheduler_Engine.classify_bucket 同源区间）。
 * @see plan/细分规则.py bucket_of()
 */
function bucketOf(spec,w){
  const br=BUCKET_RANGES[spec];
  if(br){
    for(const ruleName of ['small','medium','large']){
      const r=br[ruleName];
      if(r&&w>=r[0]&&w<=r[1])return RULE_BUCKET_TO_UI[ruleName];
    }
    const [lo,hi]=SPECS[spec].range;
    if(w<lo)return 'light';
    if(w>hi)return 'heavy';
    return 'mid';
  }
  return bucketOfLegacyThirdSplit(spec,w);
}

  const [lo,hi]=SPECS[spec].range,span=hi-lo+1;
  if(w<lo+span/3)return 'light';
  if(w<lo+span*2/3)return 'mid';

function prefixWeights(arr){const p=[0];for(const f of arr)p.push(p[p.length-1]+f.weight);return p}

function findBestPlanForSpec(spec){
  if(!isSpecEnabled(spec))return null;
  const qL=lanes[spec+'_light'].queue,qM=lanes[spec+'_mid'].queue,qH=lanes[spec+'_heavy'].queue;
  if(qL.length+qM.length+qH.length<Math.min(...SPECS[spec].counts))return null;
  const pL=prefixWeights(qL),pM=prefixWeights(qM),pH=prefixWeights(qH);
  let best=null;
  for(const cnt of SPECS[spec].counts){
    for(let a=0;a<=Math.min(qL.length,cnt);a++){
      for(let b=0;b<=Math.min(qM.length,cnt-a);b++){
        const c=cnt-a-b;if(c<0||c>qH.length)continue;
        const w=pL[a]+pM[b]+pH[c];
        if(w>=TARGET_MIN&&w<=TARGET_MAX){
          const score=Math.abs(w-TARGET_MID)+((a===0||b===0||c===0)?1.2:0);
          if(!best||score<best.score)best={spec,count:cnt,weight:w,parts:{light:a,mid:b,heavy:c},score,module:moduleOfSpec(spec)};
        }
      }
    }
  }
  return best;
}
function findBestPlanForModule(k){let best=null;for(const spec of MODULE_SPECS[k]){if(!isSpecEnabled(spec))continue;const p=findBestPlanForSpec(spec);if(p&&(!best||p.score<best.score))best=p}return best}

function bestDiagnosticForSpec(spec){
  const qL=lanes[spec+'_light'].queue,qM=lanes[spec+'_mid'].queue,qH=lanes[spec+'_heavy'].queue;
  const total=qL.length+qM.length+qH.length,minCnt=Math.min(...SPECS[spec].counts);
  if(total<minCnt)return {kind:'bad',msg:'条数不足 '+total+'/'+minCnt,short:'不足',needBucket:null,needCount:minCnt-total};
  const exact=findBestPlanForSpec(spec);
  if(exact)return {kind:'good',msg:'可装 '+exact.count+'条/'+exact.weight+'g',short:'可装',needBucket:null};
  const pL=prefixWeights(qL),pM=prefixWeights(qM),pH=prefixWeights(qH);
  let best=null;
  for(const cnt of SPECS[spec].counts){
    for(let a=0;a<=Math.min(qL.length,cnt);a++){
      for(let b=0;b<=Math.min(qM.length,cnt-a);b++){
        const c=cnt-a-b;if(c<0||c>qH.length)continue;
        const w=pL[a]+pM[b]+pH[c];
        const diff=w<TARGET_MIN?TARGET_MIN-w:w>TARGET_MAX?w-TARGET_MAX:0;
        if(!best||diff*10+Math.abs(w-TARGET_MID)<best.score)best={count:cnt,weight:w,parts:{light:a,mid:b,heavy:c},diff,score:diff*10+Math.abs(w-TARGET_MID)};
      }
    }
  }
  if(!best)return {kind:'bad',msg:'等待更多鱼',short:'等待',needBucket:'mid'};
  if(best.weight<TARGET_MIN)return {kind:'warn',msg:'偏轻 '+(TARGET_MIN-best.weight)+'g，需重鱼',short:'偏轻',needBucket:'heavy',needCount:1};
  if(best.weight>TARGET_MAX)return {kind:'warn',msg:'超重 '+(best.weight-TARGET_MAX)+'g，需轻鱼',short:'超重',needBucket:'light',needCount:1};
  return {kind:'good',msg:'接近可装',short:'接近',needBucket:null};
}

  const rng=SPECS[spec]?SPECS[spec].range:[0,0];
  const base={module:modKey,spec,address,laneId:spec,weight_ranges:[[rng[0],rng[1]]],target:'lane'};
  if(!isSpecEnabled(spec)){
    return Object.assign({},base,{priority:9,count:0,reason:'未启用',active:false});
  }
  const mod=modules[modKey];
  const total=BUCKETS.reduce((n,b)=>n+(lanes[spec+'_'+b]?.queue.length||0),0);
  const d=bestDiagnosticForSpec(spec);
  if(mod.busy&&mod.plan&&mod.plan.spec===spec&&mod.box.phase!=='idle'){
    const need=Math.max(0,(mod.plan.count||0)-(mod.plan.released||0));
    if(need>0){
      return Object.assign({},base,{priority:1,count:need,target:'box',reason:'装箱工位缺鱼',active:true});
    }
  }
  if(d.short==='可装'){
    return Object.assign({},base,{priority:4,count:0,reason:'可装',active:false});
  }
  if(d.short==='不足'){
    return Object.assign({},base,{priority:2,count:d.needCount||1,reason:'不足',active:true});
  }
  if(d.short==='偏轻'||d.short==='偏重'||d.short==='等待'){
    return Object.assign({},base,{priority:3,count:d.needCount||1,reason:d.short,active:true});
  }
  if(total>0){
    return Object.assign({},base,{priority:4,count:1,reason:d.short||('料道'+total+'条'),active:d.short!=='接近'});
  }
  return Object.assign({},base,{priority:5,count:0,reason:'监控',active:false});
}

function collectDemands(){
  const list=[];
  for(const modKey of Object.keys(MODULE_SPECS)){
    for(const spec of MODULE_SPECS[modKey]){
      list.push(specDemandEntry(modKey,spec));
    }
  }
  list.sort((a,b)=>a.priority-b.priority||a.address.localeCompare(b.address));
  return list;
}

function fishIncomingToSpec(spec){
  const mod=modules[moduleOfSpec(spec)];
  if(!mod)return 0;
  const bx=mod.box.x-30;
  return movingFish.filter(f=>f.spec===spec&&!f.done&&f.path&&f.path.length&&
    (f.path[f.path.length-1].x>=bx-20||f.x>=bx-40)).length;
}

function boxStationStatusFromServer(spec){
  const modKey=moduleOfSpec(spec);
  const info=getModuleSpecInfo(spec);
  const demand=getDemandForSpec(spec);
  const seal=boxSealTimers[spec];
  if(seal&&seal.until>simTime){
    return {spec,modKey,phase:'封箱中',state:'sealing',progress:1,detail:seal.count+'尾/'+seal.weight+'g'};
  }
  const total=info?info.total:0;
  const cap=info?info.total_capacity:specTotalCapacity(spec);
  const reason=demand?demand.reason:'';
  const incoming=fishIncomingToSpec(spec);
  if(incoming>0){
    return {spec,modKey,phase:'进箱中',state:'incoming',progress:0.25,detail:'在途 '+incoming};
  }
  if(reason==='可装'){
    return {spec,modKey,phase:'待装箱',state:'wait',progress:Math.min(0.9,total/Math.max(1,cap)),detail:'可装 · 料道 '+total};
  }
  if(total>0){
    const pct=Math.min(0.8,total/cap);
    const detail=(reason?reason+' · ':'')+'料道 '+total+'/'+cap;
    return {spec,modKey,phase:'待装箱',state:'wait',progress:pct,detail};
  }
  if(demand&&demand.active){
    return {spec,modKey,phase:'等料',state:'idle',progress:0,detail:reason||'等首条鱼'};
  }
  return {spec,modKey,phase:'空闲',state:'idle',progress:0,detail:'—'};
}

function boxStationStatus(spec){
  if(serverSessionActive()&&serverModules){
    return boxStationStatusFromServer(spec);
  }
  const modKey=moduleOfSpec(spec);
  const mod=modules[modKey];
  const queued=BUCKETS.reduce((n,b)=>n+lanes[spec+'_'+b].queue.length,0);
  const incoming=fishIncomingToSpec(spec);
  if(mod.busy&&mod.plan&&mod.plan.spec===spec){
    const progress=mod.plan.count?Math.min(1,mod.box.count/mod.plan.count):0;
    if(mod.box.phase==='sealing'){
      return {spec,modKey,phase:'封箱中',state:'sealing',progress:1,detail:mod.box.weight+'g'};
    }
    const phase=incoming>0?'进箱中':'填箱中';
    return {
      spec,modKey,phase,state:incoming>0?'incoming':'filling',progress,
      detail:mod.box.count+'/'+mod.plan.count+' · '+mod.box.weight+'g'
    };
  }
  if(incoming>0)return {spec,modKey,phase:'进箱中',state:'incoming',progress:0.15,detail:'在途 '+incoming};
  if(queued>0)return {spec,modKey,phase:'待装箱',state:'wait',progress:Math.min(0.4,queued/10),detail:'料道 '+queued};
  return {spec,modKey,phase:'空闲',state:'idle',progress:0,detail:'—'};
}

function renderBoxStations(){
  const legend='<div class="box-station-legend">'+
    '<span><i style="background:#f8fafc;border-color:#cbd5e1"></i>空闲</span>'+
    '<span><i style="background:#fef9c3;border-color:#facc15"></i>待装箱</span>'+
    '<span><i style="background:#ffedd5;border-color:#fb923c"></i>进箱中</span>'+
    '<span><i style="background:#dbeafe;border-color:#3b82f6"></i>填箱中</span>'+
    '<span><i style="background:#ede9fe;border-color:#8b5cf6"></i>封箱中</span>'+
    '</div>';
  const groups=Object.keys(MODULE_SPECS).map(modKey=>{
    const title={A:'A · 15P~40P',B:'B · 45P~90P',C:'C · 100P~150P'}[modKey]||modKey;
    const cells=MODULE_SPECS[modKey].map(spec=>{
      if(!isSpecEnabled(spec)){
        return '<div class="box-station-item st-disabled" title="'+specName(spec)+' 未启用"><div class="spec">'+specName(spec)+'</div><div class="phase">未启用</div><div class="detail">—</div></div>';
      }
      const s=boxStationStatus(spec);
      const pct=Math.round((s.progress||0)*100);
      return '<div class="box-station-item st-'+s.state+'" title="'+specName(s.spec)+' · '+s.phase+' · '+s.detail+'">'+
        '<div class="spec">'+specName(s.spec)+'</div>'+
        '<div class="phase">'+s.phase+'</div>'+
        '<div class="fill-bar"><div style="width:'+pct+'%"></div></div>'+
        '<div class="detail">'+s.detail+'</div></div>';
    }).join('');
    return '<div class="box-station-mod">'+title+'</div><div class="box-station-grid">'+cells+'</div>';
  }).join('');
  return legend+groups;
}

function getDemandsForUI(){
  if(serverDemands&&(running||finished))return serverDemands;
  return collectDemands();
}

function getInletDemandForUI(){
  if(serverInletDemand&&(running||finished))return serverInletDemand;
  const demands=getDemandsForUI();
  return demands.find(d=>d.active&&d.priority<=3)||demands.find(d=>d.active)||null;
}

function findMatchingDemand(item){
  const mod=moduleOfSpec(item.spec);
  const demands=getDemandsForUI();
  return demands.find(d=>d.active&&d.module===mod&&d.spec===item.spec
    &&weightInRanges(item.weight,d.weight_ranges))||null;
}

function getInletDemand(){
  const demands=collectDemands();
  return demands.find(d=>d.active&&d.priority<=3)||demands.find(d=>d.active)||null;
}

function enqueueToLane(lane,f){
  if(totalQueuedForSpec(lane.spec)>=specTotalCapacity(lane.spec)){stats.fifoReflow++;return false}
  f.state='queued';f.enterTime=simTime;lane.queue.push(f);normalizeLane(lane);return true;
}

function laneFromDemand(demand,item){
  const bucket=item&&item.spec?bucketOf(item.spec,item.weight):'mid';
  const id=demand.spec?demand.spec+'_'+bucket:null;
  return id?lanes[id]:null;
}

function routeToAddress(item,demand){
  const bucket=bucketOf(item.spec,item.weight);
  const lane=laneFromDemand(demand,item),mod=modules[demand.module];
  if(!lane||!mod){
    spawnNormal(item);
    return;
  }
  const f=createFish(item.spec,item.weight,bucket,item.id);
  f.direct=true;stats.directRoute++;
  f.x=55;f.y=70;
  if(demand.target==='box'&&mod.busy&&mod.plan){
    f.path=feedTrackToBox(mod);
    f.onDone=function(){
      if(!mod.plan)return;
      mod.plan.arrived++;mod.box.count++;mod.box.weight+=f.weight;
      if(lane.releaseRemaining>0){lane.releaseRemaining--;if(lane.releaseRemaining<=0)lane.gateOpen=false}
    };
    log('定向推送 #'+item.id+' '+item.weight+'g → '+demand.address+' (直送装箱)');
  }else{
    f.path=feedTrackToLane(lane);
    f.onDone=function(){
      if(!enqueueToLane(lane,f))log('#'+item.id+' 料道已满，推送失败');
      else log('定向推送 #'+item.id+' → '+demand.address+' (入料道)');
    };
  }
  movingFish.push(f);
}

function spawnNormal(item){
  const mod=modules[moduleOfSpec(item.spec)],lane=lanes[item.spec+'_'+bucketOf(item.spec,item.weight)];
  const bucket=bucketOf(item.spec,item.weight);
  const f=createFish(item.spec,item.weight,bucket,item.id);
  f.x=55;f.y=70;
  f.path=feedTrackToLane(lane);
  f.onDone=function(){
    if(totalQueuedForSpec(item.spec)>=specTotalCapacity(item.spec)){stats.fifoReflow++;stats.overflow++;return}
    f.state='queued';f.enterTime=simTime;lane.queue.push(f);normalizeLane(lane);
  };
  movingFish.push(f);
}

function spawnOutside(item){
  const f=createFish(null,item.weight,'light',item.id);
  f.color='#fb923c';f.x=55;f.y=70;
  f.path=feedTrackToTail();
  f.onDone=function(){stats.outsideTail++};
  movingFish.push(f);
}

function nextBatchItem(){
  if(!batchLoaded||batchIndex>=batchFish.length)return null;
  return batchFish[batchIndex++];
}

function startPlan(moduleKey,plan){
  const m=modules[moduleKey];m.busy=true;
  m.plan={spec:plan.spec,count:plan.count,weight:plan.weight,parts:plan.parts,released:0,arrived:0};
  m.box.count=0;m.box.weight=0;m.box.phase='filling';m.box.sealTimer=0;
  for(const b of BUCKETS){
    const lane=lanes[plan.spec+'_'+b];
    lane.releaseRemaining=plan.parts[b];lane.releaseTimer=0;lane.gateOpen=lane.releaseRemaining>0;
  }
  log(specName(plan.spec)+' 开单：小'+plan.parts.light+'+中'+plan.parts.mid+'+大'+plan.parts.heavy+' → '+plan.count+'尾/'+plan.weight+'g');
  const ds=collectDemands().filter(d=>d.module===moduleKey);
  ds.forEach(d=>log('需求广播 → 地址 '+d.address+' 缺 '+d.count+' 条 ('+d.reason+')'));
}

function releaseOneFish(m,lane){
  if(!lane.queue.length)return;
  const f=lane.queue.shift();normalizeLane(lane);
  f.state='moving';f.done=false;
  f.path=[{x:lane.x2+36,y:lane.y},{x:m.mergeX,y:lane.y},{x:m.mergeX,y:m.mergeY},{x:m.box.x-35,y:m.mergeY}];
  f.onDone=function(){if(!m.plan)return;m.plan.arrived++;m.box.count++;m.box.weight+=f.weight};
  movingFish.push(f);m.plan.released++;
}

function processModule(k,dtScaled){
  const m=modules[k];
  if(serverSessionActive()){
    if(m.box.phase==='sealing'){
      m.box.sealTimer-=dtScaled;
      if(m.box.sealTimer<=0){
        m.busy=false;m.plan=null;m.box.phase='idle';m.box.count=0;m.box.weight=0;
      }
    }
    return;
  }
  if(!m.busy){
    const p=findBestPlanForModule(k);if(p){startPlan(k,p);return}
    return;
  }
  if(!m.plan)return;
  let any=false;
  for(const b of BUCKETS){
    const lane=lanes[m.plan.spec+'_'+b];
    if(lane.releaseRemaining>0){
      any=true;lane.releaseTimer+=dtScaled;
      if(lane.releaseTimer>=.14){lane.releaseTimer=0;releaseOneFish(m,lane);lane.releaseRemaining--;if(lane.releaseRemaining<=0)lane.gateOpen=false}
    }
  }
  if(!any&&m.plan.arrived>=m.plan.count&&m.box.phase==='filling'){
    m.box.phase='sealing';m.box.sealTimer=1;
    log(specName(m.plan.spec)+' 进箱完成 '+m.box.count+'/'+m.plan.count+' 开始封箱');
  }
  if(m.box.phase==='sealing'){
    m.box.sealTimer-=dtScaled;
    if(m.box.sealTimer<=0){
      cartonSeq++;stats.cartons++;m.box.finished++;
      log('完成箱 #'+String(cartonSeq).padStart(4,'0')+'：'+m.plan.count+'尾/'+m.box.weight+'g');
      m.busy=false;m.plan=null;m.box.count=0;m.box.weight=0;m.box.phase='idle';
    }
  }
}

function finishBatch(){
  finished=true;running=false;
  let tail=0;for(const lane of laneList)tail+=lane.queue.length;
  stats.batchTail=tail;
  log('批末完成：成盒 '+stats.cartons+'，定向推送 '+stats.directRoute+'，尾料 '+tail);
  updateUI();
}

function update(dt){
  const sp=getSpeed(),dtScaled=dt*sp;simTime+=dtScaled;beltPhase+=dtScaled*120;
  if(running&&!finished){
    spawnTimer+=dt;
    const interval=1/sp;
    if(spawnTimer>=interval&&batchIndex<serverInputCount&&batchIndex<batchFish.length){
      spawnTimer-=interval;
      try{spawnBatchRow(batchFish[batchIndex++])}catch(e){console.error('spawnBatchRow',e);batchIndex++}
    }
    if(batchIndex>=getTotalFish()&&batchIndex>=serverInputCount&&!movingFish.length&&finished)finishBatch();
  }
  for(let i=movingFish.length-1;i>=0;i--){
    moveAlongPath(movingFish[i],dtScaled);
    if(movingFish[i].done)movingFish.splice(i,1);
  }
  for(const lane of laneList)for(const f of lane.queue){f.x+=(f.tx-f.x)*Math.min(1,dt*10);f.y+=(f.ty-f.y)*Math.min(1,dt*10)}
  for(const k of Object.keys(modules))processModule(k,dtScaled);
  updateUI();
}

function moveAlongPath(f,dtScaled){
  if(f.pause>0){f.pause-=dtScaled;if(f.pause>0)return;f.pause=0}
  if(!f.path||!f.path.length){if(f.onDone){const cb=f.onDone;f.onDone=null;cb()}f.done=true;return}
  const n=f.path[0],dx=n.x-f.x,dy=n.y-f.y,dist=Math.hypot(dx,dy),step=f.speed*dtScaled;
  if(dist<=step||dist===0){f.x=n.x;f.y=n.y;f.path.shift();if(n.pause)f.pause=n.pause;
    if(!f.path.length){if(f.onDone){const cb=f.onDone;f.onDone=null;cb()}f.done=true}}
  else{f.x+=dx/dist*step;f.y+=dy/dist*step}
}

function updateUI(){
  let queued=0;for(const l of laneList)queued+=l.queue.length;
  const state=syncPollState||{};
  $('sInput').textContent=serverInputCount;
  $('sInputHint').textContent=formatProgressHint(serverInputCount,serverInputWeight,state);
  $('progressBar').style.width=calcProgressPct(serverInputCount,serverInputWeight,state)+'%';
  $('sCartons').textContent=stats.cartons;
  $('sDirect').textContent=stats.directRoute;
  $('sWip').textContent=queued+movingFish.length;
  $('sStorage').textContent=serverStorageStats?serverStorageStats.count:0;
  $('sStorageHint').textContent=serverStorageStats
    ? (serverStorageStats.count+' / '+serverStorageStats.capacity
      +' · 入'+serverStorageStats.storageIn+' 出'+serverStorageStats.storagePacked
      +(serverStorageStats.storageTimeout?(' · 超时'+serverStorageStats.storageTimeout):''))
    : '0 / 150 · FIFO优先';
  $('sReflow').textContent=getReflowTailDisplay();
  $('sReflowHint').textContent=getReflowTailHint();
  const demands=getDemandsForUI();
  const activeList=demands.filter(d=>d.active);
  const activeN=activeList.length;
  $('sDemand').textContent=activeN;
  const fromServer=serverDemands&&(running||finished);
  $('demandHint').textContent=fromServer
    ? '(后端 t='+serverDemandTick+' · 活跃 '+activeN+' 规格)'
    : (running||finished?'(本地估算 · 活跃 '+activeN+' 规格)':'(等待开始)');
  const inlet=getInletDemandForUI();
  $('inletBanner').innerHTML=inlet
    ? '<strong>进料口广播地址：</strong><span class="demand-addr">'+inlet.address+'</span> 需要 '
      +inlet.count+' 条 · '+formatWeightRanges(inlet.weight_ranges)+' <span class="pill info">'+inlet.reason+'</span>'
      +(fromServer?' <span style="font-size:11px;color:#64748b">· 后端 t='+serverDemandTick+'</span>':'')
    : (fromServer?'暂无活跃需求，常规 FIFO 入料':'暂无优先需求，常规 FIFO 入料');
  $('demandPanel').innerHTML=activeList.length?activeList.map(d=>
    '<div class="demand-card'+(inlet&&inlet.address===d.address?' active':'')+'">'+
    '<span class="pill '+(d.priority<=2?'good':d.priority===3?'warn':'info')+'">P'+d.priority+'</span> '+
    '<span class="demand-addr">'+d.address+'</span><br>'+
    '× '+d.count+' · '+formatWeightRanges(d.weight_ranges)+' · '+d.reason+' · '+(d.target==='box'?'装箱工位':'料道')+
    '</div>').join(''):'<div style="color:#64748b;font-size:12px">'+(fromServer?'当前无活跃需求':'暂无需求')+'</div>';
  $('moduleState').innerHTML=renderBoxStations();
}

function frame(ts){if(!lastTs)lastTs=ts;const dt=Math.min(.05,(ts-lastTs)/1000);lastTs=ts;if(running)update(dt);else updateUI();draw();requestAnimationFrame(frame)}

async function resetLocal(){
  running=false;finished=false;lastTs=0;beltPhase=0;spawnTimer=0;simTime=0;cartonSeq=0;
  serverFinishedHandled=false;serverSessionKey='';serverInputCount=0;serverInputWeight=0;intakeSynced=false;
  serverDemands=null;serverInletDemand=null;serverDemandTick=0;serverReflowStats=null;serverStorageStats=null;serverCapFactor=null;
  resetPollCursor();
  movingFish=[];stats={input:0,cartons:0,directRoute:0,outsideTail:0,fifoReflow:0,batchTail:0,overflow:0,timeout:0};
  batchIndex=0;
  invalidateBatch();
  buildLayout();updateUI();draw();
}

async function reset(){
  await apiJson('/api/stop');
  await resetLocal();
  log('已重置，点击「开始」重新生成批次。');
}

async function fastRun(){
  running=false;
  invalidateBatch();
  resetPollCursor();
  await loadBatch(getBatchTotal());
  const body=buildStartBody({speed:Math.max(getSpeed(),200)});
  const cur=await apiJson('/api/state');
  if(!cur.running){
    const res=await apiJson('/api/start',body);
    if(!res.ok){log(res.error||'启动失败');return}
  }
  log('快速跑完：'+ (getStopMode()==='weight'?'目标 '+getTotalTons()+' t':'目标 '+getTotalFish()+' 条') +' · 后端加速运行…');
  while(true){
    const delta=await apiJson(statePollUrl());
    const state=mergePollState(delta);
    syncPollState=state;
    if(delta.snapshot_delta){
      handleNewCartons(delta.carton_records||[]);
    }
    syncServerModules(state);
    running=false;
    finished=!!state.finished;
    serverInputCount=state.input_count||0;
    stats.input=serverInputCount;
    syncRunProgressFromState(state);
    if(state.demands){
      serverDemands=state.demands;
      serverInletDemand=state.inlet_demand||null;
      serverDemandTick=state.tick||0;
    }
    batchIndex=serverInputCount;
    intakeSynced=true;
    if(state.cartons!=null)stats.cartons=state.cartons;
    syncServerReflowStats(state);
    if(state.finished&&!serverFinishedHandled){
      serverFinishedHandled=true;
      log('批末完成（与统计面板同步）：'+formatProgressHint(serverInputCount,state.input_weight||0,state));
    }
    updateUI();
    if(state.finished)break;
    await new Promise(r=>setTimeout(r,80));
  }
  draw();
  log('快速跑完结束 · '+formatProgressHint(serverInputCount,serverInputWeight,syncPollState));
}

function drawStorageBox(){

  const fh=Math.max(20,b.h*fill);

  ctx.fillStyle='#9a3412';ctx.font='bold 15px Arial';
  ctx.fillText('暂存箱',b.x+14,b.y+24);
  ctx.font='12px Arial';ctx.fillText('FIFO · 优先配盒',b.x+14,b.y+42);
  ctx.font='bold 22px Arial';ctx.fillText(String(n),b.x+14,b.y+72);
  ctx.font='12px Arial';ctx.fillStyle='#c2410c';

    ctx.fillStyle='#7c2d12';ctx.font='11px Arial';
    ctx.fillText('入 '+serverStorageStats.storageIn+' · 出 '+serverStorageStats.storagePacked,b.x+14,b.y+92);
    if(serverStorageStats.storageTimeout)ctx.fillText('超时尾料 '+serverStorageStats.storageTimeout,b.x+14,b.y+108);
    if(serverStorageStats.storageFull)ctx.fillText('箱满尾料 '+serverStorageStats.storageFull,b.x+14,b.y+124);
    const specs=Object.keys(serverStorageStats.bySpec||{}).slice(0,6);
    if(specs.length){
      ctx.fillStyle='#92400e';ctx.font='10px Arial';
      ctx.fillText(specs.map(s=>specName(s)+':'+serverStorageStats.bySpec[s]).join(' '),b.x+14,b.y+142);
    }
  }
  ctx.fillStyle='#ea580c';ctx.font='bold 11px Arial';
  ctx.fillText('进',b.x+b.w-28,b.y+b.h/2+4);
  ctx.fillText('出',b.x+b.w/2-6,b.y+16);
  drawPipe([{x:b.x+b.w,y:b.y+b.h/2},{x:660,y:b.y+b.h/2},{x:660,y:320}],'#fdba74',4);
  drawPipe([{x:b.x+b.w/2,y:b.y},{x:b.x+b.w/2,y:b.outY},{x:b.outX,y:b.outY},{x:470,y:b.outY}],'#fb923c',5);
  for(const spec of ALL_SPECS.slice(0,6)){
    if(!isSpecEnabled(spec))continue;
    const lane=lanes[spec+'_mid'];if(!lane)continue;
    drawPipe([{x:660,y:lane.y},{x:b.x+b.w,y:lane.y}],'rgba(251,146,60,0.55)',2.5);
  }
}
function drawBg(){ctx.fillStyle='#f8fafc';ctx.fillRect(0,0,canvas.width,canvas.height)}
function drawFeedTrack(){
  const {x,w,top,bottom}=FEED_TRACK,left=x-w/2,h=bottom-top;
  roundRect(left,top,w,h,10,'#e0f2fe','#38bdf8',1.8);
  roundRect(left+6,top+6,w-12,h-12,8,'#f0f9ff','#bae6fd',1);
  ctx.strokeStyle='#7dd3fc';ctx.lineWidth=3;ctx.setLineDash([6,5]);
  ctx.beginPath();ctx.moveTo(x,top+8);ctx.lineTo(x,bottom-8);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#0369a1';ctx.font='bold 11px Arial';
  ctx.save();ctx.translate(left-10,top+h/2);ctx.rotate(-Math.PI/2);ctx.fillText('进料轨道',0,0);ctx.restore();
  for(const spec of ALL_SPECS){
    const lane=lanes[spec+'_mid'];if(!lane)continue;
    ctx.strokeStyle=isSpecEnabled(spec)?'rgba(147,197,253,.45)':'rgba(203,213,225,.35)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x+w/2-2,lane.y);ctx.lineTo(660,lane.y);ctx.stroke();
  }
  drawPipe([{x:470,y:128},{x:470,y:top+4},{x:x,y:top+4}],'#60a5fa',7);
  ctx.fillStyle='#0369a1';ctx.font='10px Arial';ctx.fillText('↓ 下行分轨',x-22,top-6);
}
function drawUpstream(){
  drawConv(40,70,210,42,true,'#dbeafe','#93c5fd','进料口');
  drawConv(285,70,90,42,true,'#dbeafe','#93c5fd','称重');
  roundRect(405,52,130,76,12,'#dbeafe','#60a5fa',1.5);
  ctx.fillStyle='#1e40af';ctx.font='bold 13px Arial';ctx.fillText('需求匹配/推送',415,78);
  if(currentInletDemand||getInletDemandForUI()){
    const d=getInletDemandForUI();if(d){ctx.fillStyle='#92400e';ctx.font='11px Arial';ctx.fillText('→ '+d.address,415,98)}
  }
  drawPipe([{x:535,y:91},{x:470,y:91},{x:470,y:128}],'#93c5fd',8);
}
function drawModule(m){
  roundRect(m.x,m.y,1070,448,18,'#fff','#cbd5e1',1.5);
  ctx.fillStyle=m.color;roundTop(m.x,m.y,1070,34,18);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 17px Arial';ctx.fillText(m.title,m.x+14,m.y+22);
  let gy=m.y+56;
  for(const spec of m.specs){
    const dis=!isSpecEnabled(spec);
    roundRect(m.x+14,gy-11,990,66,10,dis?'#f8fafc':'#fff',dis?'#e2e8f0':'#dbe3ef',1);
    ctx.fillStyle=dis?'#cbd5e1':m.color;roundRect(m.x+22,gy-2,70,44,10,dis?'#cbd5e1':m.color,dis?'#cbd5e1':m.color,1);
    ctx.fillStyle=dis?'#94a3b8':'#fff';ctx.font='bold 16px Arial';ctx.fillText(specName(spec),m.x+34,gy+16);
    for(const b of BUCKETS){const lane=lanes[spec+'_'+b];drawLane(lane,m);drawGate(lane);drawPipe([{x:lane.x2+32,y:lane.y},{x:m.mergeX,y:lane.y}],dis?'#e2e8f0':'#bbf7d0',5)}
    gy+=66;
  }
  drawBox(m);
}
function serverLaneCounts(spec,bucket){
  const info=getModuleSpecInfo(spec);
  if(!info)return null;
  const map={light:info.small,mid:info.medium,heavy:info.large};
  return {lane:map[bucket]??0,total:info.total,cap:info.total_capacity};
}

function drawLane(lane,m){
  const dis=!isSpecEnabled(lane.spec);
  const cap=capacityForSpec(lane.spec);
  const srv=serverSessionActive()&&serverLaneCounts(lane.spec,lane.bucket);
  const laneN=srv?srv.lane:lane.queue.length;
  const specTot=srv?srv.total:totalQueuedForSpec(lane.spec);
  const specCap=srv?srv.cap:specTotalCapacity(lane.spec);
  roundRect(m.x+112,lane.y-8,30,16,8,dis?'#e2e8f0':BUCKET_COLOR[lane.bucket],'#94a3b8',1);
  ctx.fillStyle=dis?'#94a3b8':'#0f172a';ctx.font='bold 11px Arial';ctx.fillText(bucketLabel(lane.bucket),m.x+118,lane.y+4);
  const br=BUCKET_RANGES[lane.spec],rule=UI_BUCKET_TO_RULE[lane.bucket];
  if(br&&br[rule]&&!dis){ctx.font='9px Arial';ctx.fillStyle='#64748b';ctx.fillText(br[rule][0]+'-'+br[rule][1],m.x+118,lane.y+14)}
  drawConv(lane.x1,lane.y-8,lane.x2-lane.x1,16,true,dis?'#f1f5f9':'#dcfce7',dis?'#e2e8f0':'#bbf7d0',null);
  ctx.fillStyle='#64748b';ctx.font='10px Arial';
  ctx.fillText(laneN+'/'+cap+' · Σ'+specTot+'/'+specCap,lane.x1+4,lane.y-11);
}
function drawGate(lane){const x=lane.x2+8,y=lane.y-10;roundRect(x,y,24,20,5,lane.gateOpen?'#dcfce7':'#f1f5f9',lane.gateOpen?'#16a34a':'#94a3b8',1)}
function drawBox(m){
  const b=m.box,x=b.x,y=b.y;
  roundRect(x,y,145,88,14,'#fffbeb','#fcd34d',1.2);
  ctx.fillStyle='#8d5b00';ctx.font='bold 14px Arial';ctx.fillText('装箱工位',x+12,y+20);
  const sealing=m.box.phase==='sealing'&&m.plan;
  const txt=sealing?specName(m.plan.spec)+' 封箱中':(m.plan?specName(m.plan.spec)+' '+b.count+'/'+m.plan.count:'等待');
  ctx.fillStyle='#5d4a2b';ctx.font='12px Arial';ctx.fillText(txt,x+82,y+38);
  roundRect(x+82,y+48,50,9,5,'#fde68a','#f6c453',1);
  if(sealing||m.plan)roundRect(x+82,y+48,50*(sealing?1:(b.count/Math.max(1,m.plan.count))),9,5,'#f59e0b','#f59e0b',1);
  ctx.fillText(sealing?m.box.weight+'g':b.weight+'g',x+82,y+68);
  roundRect(x+175,y,100,88,14,'#eff6ff','#93c5fd',1.2);
  const finishedN=serverSessionActive()?m.box.finished:b.finished;
  ctx.fillStyle='#1d4ed8';ctx.font='bold 13px Arial';ctx.fillText('成品 '+finishedN+'箱',x+188,y+48);
}
function drawTail(){
  roundRect(1480,1310,215,88,16,'#fff7ed','#fdba74',1.5);
  ctx.fillStyle='#9a3412';ctx.font='bold 14px Arial';ctx.fillText('规格外尾料箱',1498,1340);
  ctx.fillText(String(serverReflowStats?serverReflowStats.outside_count:stats.outsideTail),1580,1340);
}
function drawFish(){
  if($('drawMode').value==='light'&&serverInputCount>8000)return;
  for(const lane of laneList)for(let i=0;i<Math.min(lane.queue.length,lane.visibleSlots);i++){
    const f=lane.queue[i];drawOneFish(f.x,f.y,f.color,f.weight,f.direct,f.id);
  }
  for(const f of movingFish)drawOneFish(f.x,f.y,f.color,f.weight,f.direct,f.id);
}
function drawOneFish(x,y,color,w,direct,id){
  const size=16;
  ctx.save();ctx.translate(x,y);
  ctx.fillStyle=color||'#7dd3fc';
  ctx.beginPath();ctx.ellipse(0,0,size*.68,size*.38,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(-size*.62,0);ctx.lineTo(-size*1.05,-size*.33);ctx.lineTo(-size*1.05,size*.33);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.beginPath();ctx.arc(size*.32,-size*.06,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1e293b';ctx.font='10px Arial';ctx.fillText(String(w),-12,-10);
  if(id)ctx.fillText('#'+id,-12,12);
  ctx.restore();
}
function drawConv(x,y,w,h,hor,base,stripe,label){roundRect(x,y,w,h,7,base,'#97a9bf',1);if(label){ctx.fillStyle='#45637f';ctx.font='11px Arial';ctx.fillText(label,x+6,y-4)}}
function drawPipe(pts,color,w){ctx.strokeStyle=color;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.stroke()}
function roundTop(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r)}
function roundRect(x,y,w,h,r,fill,stroke,lw){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke()}}

window.addEventListener('load',async function(){
  canvas=$('scene');ctx=canvas.getContext('2d');
  $('tabBtnFifo').onclick=()=>setActiveView('fifo');
  $('tabBtnStats').onclick=()=>setActiveView('stats');
  if(location.hash==='#stats')setActiveView('stats');
  $('speedInput').addEventListener('input',scheduleSpeedSync);
  $('speedInput').addEventListener('change',scheduleSpeedSync);
  $('stopMode').addEventListener('change',()=>{if(running||finished){log('运行中无法切换结束条件');return}updateStopModeUI();invalidateBatch()});
  $('totalFish').addEventListener('change',()=>{if(!running&&!finished)invalidateBatch()});
  $('totalTons').addEventListener('change',()=>{if(!running&&!finished)invalidateBatch()});
  $('seedInput').addEventListener('change',()=>{if(!running&&!finished)invalidateBatch()});
  updateStopModeUI();
  $('startBtn').onclick=async()=>{
    const cur=await apiJson('/api/state');
    if(cur.running){
      if(cur.paused){
        const res=await apiJson('/api/resume');
        if(!res.ok){log(res.error||'继续失败');return}
        await applyServerState(res.state,false);
        log('继续运行（与统计面板同步）');
      }else{
        await applyServerState(cur,true);
        log('已接入运行中的模拟（与统计面板同步）');
      }
      return;
    }
    invalidateBatch();
    resetPollCursor();
    await loadBatch(getBatchTotal());
    const body=buildStartBody();
    const res=await apiJson('/api/start',body);
    if(!res.ok){log(res.error||'启动失败');return}
    intakeSynced=false;
    batchIndex=0;
    spawnTimer=0;
    syncRunProgressFromState(res.state);
    await applyServerState(res.state,false);
    log('开始 · '+ (getStopMode()==='weight'?'按总重 '+getTotalTons()+' t':'按条数 '+getTotalFish()+' 条'));
  };
  $('pauseBtn').onclick=async()=>{
    const res=await apiJson('/api/pause');
    running=false;
    await applyServerState(res.state,false);
    log('暂停（与统计面板同步）');
  };
  $('fastBtn').onclick=fastRun;
  $('resetBtn').onclick=reset;
  buildLayout();
  buildSpecToggles();
  try{
    const cfg=await apiJson('/api/config');
    if(cfg.default_enabled_specs)setEnabledSpecs(cfg.default_enabled_specs);
    if(cfg.default_stop_weight_tons!=null)$('totalTons').value=cfg.default_stop_weight_tons;
    if(cfg.default_stop_mode)$('stopMode').value=cfg.default_stop_mode;
    applySpecCountsFromConfig(cfg);
    if(cfg.default_cap_factor!=null)$('capacityFactor').value=cfg.default_cap_factor;
    updateStopModeUI();
    if(applyBucketRangesFromConfig(cfg)){
      log('小中大区间已同步：'+ (cfg.bucket_rules_source||'plan/细分规则.py'));
      const sample=['15p','60p','120p'].filter(s=>BUCKET_RANGES[s]);
      sample.forEach(s=>log('  '+specName(s)+' '+formatBucketRanges(s)));
    }
  }catch(e){console.error(e)}
  const state=await apiJson('/api/state');
  if(state.running||state.finished){
    await applyServerState(state,true);
    log(state.finished?'已接入已完成批次':'已接入运行中的模拟');
  }else{
    updateUI();
    log('就绪：默认按条数 25000 或按总重 10t · 点击「开始」生成批次并启动');
  }
  startSyncPoll();
  requestAnimationFrame(frame);
});
</script>
