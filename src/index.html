<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能分拣系统 · 可视化</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --line: #e2e8f0;
      --green: #16a34a;
      --blue: #2563eb;
      --purple: #7c3aed;
      --amber: #d97706;
      --red: #dc2626;
      --small: #7dd3fc;
      --mid: #86efac;
      --large: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--line);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 700; }
    header p { font-size: 13px; color: var(--muted); margin-top: 4px; }
    header a { color: var(--blue); font-size: 13px; text-decoration: none; margin-left: 16px; }
    .status-pill {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      background: #e2e8f0;
      color: #475569;
    }
    .status-pill.running { background: #dcfce7; color: #166534; }
    .status-pill.paused { background: #fef3c7; color: #92400e; }
    .status-pill.finished { background: #dbeafe; color: #1e40af; }

    main { padding: 20px 24px 40px; max-width: 1440px; margin: 0 auto; }

    .controls {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      margin-bottom: 18px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input, .field select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      width: 120px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: var(--blue);
    }
    button.secondary { background: #64748b; }
    button.warn { background: var(--amber); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .stat .label { font-size: 12px; color: var(--muted); }
    .stat .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
    .stat .hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .progress-wrap {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 18px;
    }
    .progress-bar {
      height: 10px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-bar div {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      width: 0%;
      transition: width 0.2s;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 18px;
    }
    @media (max-width: 1100px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
    }
    .panel h2 {
      font-size: 15px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mod-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .mod-A { background: var(--green); }
    .mod-B { background: var(--blue); }
    .mod-C { background: var(--purple); }

    .spec-row {
      display: grid;
      grid-template-columns: 52px 1fr 36px;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .spec-name { font-weight: 600; color: #334155; }
    .bars {
      display: flex;
      gap: 3px;
      height: 18px;
      align-items: stretch;
    }
    .bar {
      border-radius: 4px;
      min-width: 2px;
      transition: width 0.15s;
    }
    .bar.small { background: var(--small); }
    .bar.mid { background: var(--mid); }
    .bar.large { background: var(--large); }
    .spec-total { text-align: right; color: var(--muted); }

    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 18px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .chart-legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .chart-legend span::before {
      content: "";
      display: inline-block;
      width: 18px;
      height: 3px;
      border-radius: 2px;
      vertical-align: middle;
    }
    .chart-legend .l-input::before { background: var(--blue); }
    .chart-legend .l-cartons::before { background: var(--green); }
    .chart-legend .l-reflow::before { background: var(--amber); }
    canvas#chart {
      width: 100%;
      height: 200px;
      display: block;
    }

    .log {
      max-height: 420px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.55;
    }
    .log-item {
      padding: 6px 0;
      border-bottom: 1px dashed var(--line);
    }
    .log-item .t { color: var(--muted); margin-right: 6px; }
    .log-item.pack { color: #166534; }
    .log-item.reflow { color: #92400e; }
    .log-item.outside { color: var(--red); }
    .log-item.done { color: var(--blue); font-weight: 600; }

    .carton-list { font-size: 12px; }
    .carton-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
    }
    .data-summary {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.6;
    }
    .data-table-wrap {
      max-height: 52vh;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .data-table th,
    .data-table td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    .data-table th {
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 1;
      font-weight: 600;
      color: var(--muted);
    }
    .data-table tr:hover td { background: #f8fafc; }
    .tag-timeout { color: #92400e; }
    .tag-overflow { color: #1d4ed8; }
    .tag-tail { color: #b91c1c; }
    .fish-detail { color: var(--muted); font-size: 11px; margin-top: 4px; line-height: 1.45; }

    .legend {
      display: flex;
      gap: 14px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .legend span::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 4px;
      vertical-align: middle;
    }
    .legend .l-small::before { background: var(--small); }
    .legend .l-mid::before { background: var(--mid); }
    .legend .l-large::before { background: var(--large); }
    html.embed-mode header { display: none; }
    html.embed-mode .controls { display: none; }
    html.embed-mode main { padding: 12px 16px 20px; max-width: none; margin: 0; }
    html.embed-mode body { min-height: auto; background: var(--bg); }
    .embed-bar {
      display: none;
      padding: 10px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    html.embed-mode .embed-bar { display: flex; }
  </style>
</head>
<body>
  <div class="embed-bar">
    <span style="font-size:14px;font-weight:700">统计监控</span>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div id="statusPillEmbed" class="status-pill">待机</div>
      <button type="button" class="secondary" id="btnViewCartonsEmbed">成盒数据</button>
      <button type="button" class="secondary" id="btnViewRemainingEmbed">尾料数据</button>
      <button type="button" class="secondary" id="btnViewTimeoutEmbed">超时回流</button>
      <button type="button" class="secondary" id="btnViewOverflowEmbed">超容回流</button>
      <a id="btnReportEmbed" href="/api/report?seed=42" style="text-decoration:none">
        <button type="button" class="secondary" disabled id="btnReportEmbedInner">下载报告</button>
      </a>
    </div>
  </div>
  <header>
    <div>
      <h1>智能分拣系统 · 可视化监控</h1>
      <p>25000 条种子批次 · FIFO 小/中/大料道 · 5kg 装盒 · 超时回流
        <a href="/monitor">→ FIFO 动画监控（推荐单页）</a>
      </p>
    </div>
    <div id="statusPill" class="status-pill">待机</div>
  </header>

  <main>
    <div class="controls">
      <div class="field"><label>随机种子</label><input id="seed" type="number" value="42"></div>
      <div class="field"><label>总条数</label><input id="total" type="number" value="25000"></div>
      <div class="field"><label>移动超时(s)</label><input id="moveTimeout" type="number" value="120"></div>
      <div class="field"><label>模拟倍速</label><input id="speed" type="number" value="50" min="1"></div>
      <button id="btnStart">开始模拟</button>
      <button id="btnPause" class="warn" disabled>暂停</button>
      <button id="btnResume" class="secondary" disabled>继续</button>
      <button id="btnStop" class="secondary" disabled>停止</button>
      <a id="btnReport" href="/api/report?seed=42" style="text-decoration:none">
        <button type="button" class="secondary" disabled id="btnReportInner">下载报告</button>
      </a>
      <button type="button" class="secondary" id="btnViewCartons">成盒数据</button>
      <button type="button" class="secondary" id="btnViewRemaining">尾料数据</button>
      <button type="button" class="secondary" id="btnViewTimeout">超时回流</button>
      <button type="button" class="secondary" id="btnViewOverflow">超容回流</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="label">运行时间</div><div class="value" id="sTick">0</div><div class="hint" id="sTickHint">秒 · 真实经过时间</div></div>
      <div class="stat"><div class="label">入料进度</div><div class="value" id="sInput">0</div><div class="hint" id="sInputHint">/ 25000</div></div>
      <div class="stat"><div class="label">成功装盒</div><div class="value" id="sCartons">0</div><div class="hint">4980~5030g</div></div>
      <div class="stat"><div class="label">装箱鱼数</div><div class="value" id="sPacked">0</div></div>
      <div class="stat"><div class="label">回流动作</div><div class="value" id="sReflow">0</div><div class="hint" id="sReflowHint">超时/超容 · 累计次数</div></div>
      <div class="stat"><div class="label">规格外</div><div class="value" id="sOutside">0</div></div>
      <div class="stat"><div class="label">未匹配尾料</div><div class="value" id="sUnmatched">0</div></div>
      <div class="stat"><div class="label">回流待入库</div><div class="value" id="sReflowQ">0</div></div>
    </div>

    <div class="progress-wrap">
      <div style="display:flex;justify-content:space-between;font-size:13px">
        <span>入料进度</span>
        <span id="progressText">0%</span>
      </div>
      <div class="progress-bar"><div id="progressBar"></div></div>
    </div>

    <div class="grid-2">
      <div>
        <div class="panel" style="margin-bottom:18px">
          <h2>趋势 · 装盒 / 回流 / 入料</h2>
          <div class="chart-legend" aria-hidden="false">
            <span class="l-input">入料（累计条数）</span>
            <span class="l-cartons">装盒（累计箱数）</span>
            <span class="l-reflow">回流（累计次数）</span>
          </div>
          <canvas id="chart" width="900" height="200"></canvas>
        </div>

        <div id="modulePanels"></div>
      </div>

      <div>
        <div class="panel" style="margin-bottom:18px">
          <h2>最近封箱</h2>
          <div class="carton-list" id="cartonList"><div style="color:var(--muted);font-size:12px">暂无</div></div>
        </div>
        <div class="panel">
          <h2>实时日志</h2>
          <div class="log" id="logBox"></div>
        </div>
      </div>
    </div>
  </main>

  <dialog id="dataDialog" class="panel" style="max-width:920px;width:94%;border:none;padding:16px">
    <h2 id="dataDialogTitle" style="margin-bottom:8px"></h2>
    <p id="dataDialogMeta" style="font-size:12px;color:var(--muted);margin-bottom:10px"></p>
    <div id="dataDialogBody" class="log" style="max-height:55vh"></div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <a id="dataDialogExport" href="#" style="text-decoration:none"><button type="button" class="secondary">导出 CSV</button></a>
      <button type="button" class="secondary" id="dataDialogClose">关闭</button>
    </div>
  </dialog>

  <script>
    const EMBED = new URLSearchParams(location.search).get("embed") === "1";
    if (EMBED) document.documentElement.classList.add("embed-mode");

    const $ = id => document.getElementById(id);
    const MODULE_META = { A: "15P~40P", B: "45P~90P", C: "100P~150P" };
    const BUCKET_LABEL = { small: "小", medium: "中", large: "大" };

    let pollTimer = null;
    let lastEventCount = 0;
    let seenEventKeys = new Set();
    let lastState = null;

    async function api(path, body) {
      const opt = body ? {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      } : {};
      const res = await fetch(path, opt);
      return res.json();
    }

    function setStatus(st) {
      const map = { idle: "待机", running: "运行中", paused: "已暂停", finished: "已完成" };
      const text = map[st] || st;
      const cls = "status-pill " + (st || "idle");
      const pill = $("statusPill");
      if (pill) {
        pill.textContent = text;
        pill.className = cls;
      }
      const embedPill = $("statusPillEmbed");
      if (embedPill) {
        embedPill.textContent = text;
        embedPill.className = cls;
      }
    }

    function renderModules(modules) {
      const root = $("modulePanels");
      root.innerHTML = "";
      for (const [mod, specs] of Object.entries(modules || {})) {
        const panel = document.createElement("div");
        panel.className = "panel";
        panel.style.marginBottom = "14px";
        panel.innerHTML = `
          <h2><span class="mod-dot mod-${mod}"></span>模块 ${mod} · ${MODULE_META[mod] || ""}</h2>
          <div class="legend">
            <span class="l-small">小</span><span class="l-mid">中</span><span class="l-large">大</span>
          </div>
          <div class="spec-rows"></div>
        `;
        const rows = panel.querySelector(".spec-rows");
        const entries = Object.entries(specs).sort((a, b) => a[0].localeCompare(b[0]));
        for (const [spec, q] of entries) {
          const maxBar = Math.max(q.capacity * 3, q.total, 1);
          const sw = Math.max(2, (q.small / maxBar) * 100);
          const mw = Math.max(2, (q.medium / maxBar) * 100);
          const lw = Math.max(2, (q.large / maxBar) * 100);
          const row = document.createElement("div");
          row.className = "spec-row";
          const off = q.enabled === false;
          row.style.opacity = off ? "0.38" : "";
          row.title = off ? "未启用规格" : "";
          row.innerHTML = `
            <div class="spec-name">${spec.toUpperCase()}${off ? " (未启用)" : ""}</div>
            <div class="bars">
              <div class="bar small" style="width:${sw}%" title="小 ${q.small}"></div>
              <div class="bar mid" style="width:${mw}%" title="中 ${q.medium}"></div>
              <div class="bar large" style="width:${lw}%" title="大 ${q.large}"></div>
            </div>
            <div class="spec-total">${q.total}</div>
          `;
          rows.appendChild(row);
        }
        root.appendChild(panel);
      }
    }

    function drawChart(history) {
      const canvas = $("chart");
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      if (!history || history.length < 2) return;

      const pad = { l: 48, r: 16, t: 16, b: 40 };
      const maxTick = Math.max(...history.map(p => p.tick), 1);
      const maxVal = Math.max(...history.map(p => Math.max(p.input, p.cartons, p.reflow)), 1);

      const xScale = x => pad.l + (x / maxTick) * (w - pad.l - pad.r);
      const yScale = y => h - pad.b - (y / maxVal) * (h - pad.t - pad.b);

      ctx.font = "11px sans-serif";
      ctx.fillStyle = "#64748b";

      const yTicks = [0, Math.round(maxVal / 2), maxVal];
      yTicks.forEach(v => {
        const y = yScale(v);
        ctx.strokeStyle = v === 0 ? "#e2e8f0" : "#f1f5f9";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.l, y);
        ctx.lineTo(w - pad.r, y);
        ctx.stroke();
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.fillText(String(v), pad.l - 8, y);
      });

      const xDivs = 4;
      for (let i = 0; i <= xDivs; i++) {
        const tick = Math.round((maxTick * i) / xDivs);
        const x = xScale(tick);
        ctx.strokeStyle = i === 0 ? "#e2e8f0" : "#f8fafc";
        ctx.beginPath();
        ctx.moveTo(x, pad.t);
        ctx.lineTo(x, h - pad.b);
        ctx.stroke();
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(String(tick), x, h - pad.b + 6);
      }

      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.l, pad.t);
      ctx.lineTo(pad.l, h - pad.b);
      ctx.lineTo(w - pad.r, h - pad.b);
      ctx.stroke();

      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.fillText("运行时间 (s)", pad.l + (w - pad.l - pad.r) / 2, h - 2);

      function line(key, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        history.forEach((p, i) => {
          const x = xScale(p.tick), y = yScale(p[key]);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
      }
      line("input", "#2563eb");
      line("cartons", "#16a34a");
      line("reflow", "#d97706");
    }

    function formatLogEvent(ev) {
      let extra = "";
      if (ev.reason === "timeout" && ev.dwell_s != null) {
        const th = ev.threshold_s != null ? ` · 阈值${ev.threshold_s}s` : "";
        extra = ` <span style="color:#b45309;font-weight:600">停留 ${ev.dwell_s}s${th}</span>`;
      }
      return `<span class="t">t=${ev.tick}</span>${ev.msg}${extra}`;
    }

    function appendLogs(events) {
      if (!events || !events.length) return;
      const box = $("logBox");
      events.forEach(ev => {
        const key = `${ev.tick}|${ev.fish_id ?? ""}|${ev.reason ?? ""}|${ev.msg}`;
        if (seenEventKeys.has(key)) return;
        seenEventKeys.add(key);
        const div = document.createElement("div");
        div.className = "log-item " + (ev.kind || "");
        div.innerHTML = formatLogEvent(ev);
        box.appendChild(div);
      });
      while (box.childNodes.length > 120) box.removeChild(box.firstChild);
      box.scrollTop = box.scrollHeight;
    }

    function renderCartons(list) {
      const el = $("cartonList");
      if (!list || !list.length) {
        el.innerHTML = '<div style="color:var(--muted);font-size:12px">暂无</div>';
        return;
      }
      el.innerHTML = list.slice().reverse().map(c => {
        const parts = Object.entries(c.parts)
          .filter(([, n]) => n)
          .map(([b, n]) => BUCKET_LABEL[b] + n)
          .join("+");
        return `<div class="carton-item"><strong>${c.spec.toUpperCase()}</strong> ${c.count}尾 ${c.weight}g<br><span style="color:var(--muted)">${parts}</span></div>`;
      }).join("");
    }

    function currentSeed() {
      return +$("seed").value || 42;
    }

    function formatFishInCarton(r) {
      const list = r.fish && r.fish.length
        ? r.fish
        : (r.fish_ids || []).map((id, i) => ({
            id,
            weight: (r.fish_weights || [])[i],
            bucket: "",
          }));
      if (!list.length) return '<span class="fish-detail">（无单鱼明细，请重跑批后导出）</span>';
      return '<div class="fish-detail">' + list.map(f => {
        const b = f.bucket ? BUCKET_LABEL[f.bucket] || f.bucket : "";
        const w = f.weight != null ? f.weight + "g" : "?g";
        return `#${f.id} ${w}${b ? " " + b : ""}`;
      }).join(" · ") + "</div>";
    }

    function renderCartonRecords(records) {
      if (!records.length) {
        return '<div style="color:var(--muted);font-size:12px">暂无成盒数据（请先跑完模拟或确认 data/cartons_seed_*.csv 存在）</div>';
      }
      const show = records.slice(0, 500);
      const body = show.map(r => {
        const p = r.parts || {};
        const parts = ["small", "medium", "large"].filter(b => p[b]).map(b => BUCKET_LABEL[b] + p[b]).join("+");
        return `<tr>
          <td>${r.seq || "?"}</td>
          <td>${String(r.spec).toUpperCase()}</td>
          <td>${r.count}</td>
          <td>${r.weight}</td>
          <td>${parts || "-"}</td>
          <td>${formatFishInCarton(r)}</td>
        </tr>`;
      }).join("");
      const tail = records.length > 500
        ? `<div class="data-summary">… 仅显示前 500 盒，共 ${records.length} 盒，完整数据请导出 CSV</div>`
        : `<div class="data-summary">共 ${records.length} 盒 · 单鱼重量见「每条鱼」列</div>`;
      return tail + `<div class="data-table-wrap"><table class="data-table">
        <thead><tr><th>箱号</th><th>规格</th><th>尾数</th><th>总重g</th><th>分区</th><th>每条鱼（ID·重量·小中大）</th></tr></thead>
        <tbody>${body}</tbody></table></div>`;
    }

    function summarizeRemaining(fish) {
      const byCause = {};
      let timeoutN = 0, overflowN = 0, bothN = 0;
      for (const f of fish) {
        const c = f.tail_cause || f.status || "未知";
        byCause[c] = (byCause[c] || 0) + 1;
        if (f.had_timeout) timeoutN++;
        if (f.had_overflow) overflowN++;
        if (f.had_timeout && f.had_overflow) bothN++;
      }
      const lines = Object.entries(byCause).map(([k, n]) => `${k}：${n}`);
      return `<div class="data-summary">
        <strong>未匹配原因汇总</strong>（${fish.length} 条）<br>
        ${lines.join(" · ") || "—"}<br>
        过程回流：超时 ${timeoutN} · 超容 ${overflowN} · 兼有 ${bothN}
        <br><span style="font-size:11px">「尾料原因」= 批末状态；「回流记录」= 仿真中是否曾因超时/超容被弹出料道</span>
      </div>`;
    }

    function renderRemainingFish(fish) {
      if (!fish.length) {
        return '<div style="color:var(--muted);font-size:12px">暂无尾料（25000 条跑完后才会生成 remaining_seed_*.csv）</div>';
      }
      const show = fish.slice(0, 800);
      const body = show.map(f => {
        const reflow = f.reflow_summary || (f.reflow_reasons || []).join("、") || "无";
        const dwell = f.dwell_time != null ? f.dwell_time + "s" : "—";
        const tClass = f.had_timeout ? "tag-timeout" : "";
        const oClass = f.had_overflow ? "tag-overflow" : "";
        return `<tr>
          <td>${f.fish_id}</td>
          <td>${f.weight}</td>
          <td>${(f.spec || "-").toUpperCase()}</td>
          <td class="tag-tail">${f.tail_cause || f.status || ""}</td>
          <td><span class="${tClass}">${f.had_timeout ? "是" : ""}</span></td>
          <td><span class="${oClass}">${f.had_overflow ? "是" : ""}</span></td>
          <td>${reflow}</td>
          <td>${f.rounds || 1}</td>
          <td>${dwell}</td>
        </tr>`;
      }).join("");
      const tail = fish.length > 800
        ? `<div class="data-summary">… 仅显示前 800 条，共 ${fish.length} 条</div>`
        : "";
      return summarizeRemaining(fish) + tail + `<div class="data-table-wrap"><table class="data-table">
        <thead><tr>
          <th>鱼ID</th><th>重量g</th><th>规格</th><th>尾料原因</th>
          <th>曾超时</th><th>曾超容</th><th>回流记录</th><th>轮次</th><th>停留s</th>
        </tr></thead><tbody>${body}</tbody></table></div>`;
    }

    function renderTimeoutReflowLog(records) {
      if (!records.length) {
        return '<div style="color:var(--muted);font-size:12px">暂无超时回流（模拟运行后才会产生记录）</div>';
      }
      const show = records.slice().reverse().slice(0, 1000);
      const body = show.map((r, i) => {
        const b = BUCKET_LABEL[r.bucket] || r.bucket || "-";
        return `<tr>
          <td>${records.length - i}</td>
          <td>t=${r.tick}</td>
          <td>${r.fish_id}</td>
          <td>${r.weight ?? "-"}</td>
          <td>${String(r.spec || "-").toUpperCase()}</td>
          <td>${b}</td>
          <td class="tag-timeout"><strong>${r.dwell_s}s</strong></td>
          <td>${r.threshold_s ?? "-"}</td>
          <td>${r.rounds ?? "-"}</td>
        </tr>`;
      }).join("");
      const avg = (records.reduce((s, r) => s + (r.dwell_s || 0), 0) / records.length).toFixed(1);
      const max = Math.max(...records.map(r => r.dwell_s || 0));
      const summary = `<div class="data-summary">
        共 <strong>${records.length}</strong> 次超时回流 ·
        停留时间 平均 ${avg}s · 最大 ${max}s ·
        「停留s」= 队头在该分区料道的累计等待时间（回流入队后重新计时）
      </div>`;
      const tail = records.length > 1000
        ? `<div class="data-summary">… 仅显示最近 1000 条</div>`
        : "";
      return summary + tail + `<div class="data-table-wrap"><table class="data-table">
        <thead><tr>
          <th>#</th><th>时刻</th><th>鱼ID</th><th>重量g</th><th>规格</th><th>分区</th>
          <th>停留s</th><th>阈值s</th><th>轮次</th>
        </tr></thead><tbody>${body}</tbody></table></div>`;
    }

    function showTimeoutReflowDialog() {
      const records = lastState?.timeout_reflow_log || [];
      $("dataDialogTitle").textContent = "超时回流记录";
      $("dataDialogMeta").textContent = records.length
        ? `种子 ${lastState?.seed ?? currentSeed()} · 共 ${records.length} 次 · 阈值 ${lastState?.move_timeout ?? $("moveTimeout").value}s`
        : "暂无记录（请先开始模拟）";
      $("dataDialogBody").innerHTML = renderTimeoutReflowLog(records);
      $("dataDialogExport").href = "#";
      $("dataDialogExport").style.display = "none";
      $("dataDialog").showModal();
    }

    function renderOverflowReflowLog(records) {
      if (!records.length) {
        return '<div style="color:var(--muted);font-size:12px">暂无超容回流（模拟运行后才会产生记录）</div>';
      }
      const show = records.slice().reverse().slice(0, 1000);
      const body = show.map((r, i) => {
        const b = BUCKET_LABEL[r.bucket] || r.bucket || "-";
        return `<tr>
          <td>${records.length - i}</td>
          <td>t=${r.tick}</td>
          <td>${r.fish_id}</td>
          <td>${r.weight ?? "-"}</td>
          <td>${String(r.spec || "-").toUpperCase()}</td>
          <td>${b}</td>
          <td class="tag-overflow"><strong>${r.lane_len}</strong></td>
          <td>${r.cap ?? "-"}</td>
          <td>${r.rounds ?? "-"}</td>
        </tr>`;
      }).join("");
      const avg = (records.reduce((s, r) => s + (r.lane_len || 0), 0) / records.length).toFixed(1);
      const max = Math.max(...records.map(r => r.lane_len || 0));
      const summary = `<div class="data-summary">
        共 <strong>${records.length}</strong> 次超容回流 ·
        料道长度 平均 ${avg} · 最大 ${max} ·
        「料道数」= 弹出时该分区队列长度；「容量」= 允许上限（超出则弹出队头）
      </div>`;
      const tail = records.length > 1000
        ? `<div class="data-summary">… 仅显示最近 1000 条</div>`
        : "";
      return summary + tail + `<div class="data-table-wrap"><table class="data-table">
        <thead><tr>
          <th>#</th><th>时刻</th><th>鱼ID</th><th>重量g</th><th>规格</th><th>分区</th>
          <th>料道数</th><th>容量</th><th>轮次</th>
        </tr></thead><tbody>${body}</tbody></table></div>`;
    }

    function showOverflowReflowDialog() {
      const records = lastState?.overflow_reflow_log || [];
      $("dataDialogTitle").textContent = "超容回流记录";
      $("dataDialogMeta").textContent = records.length
        ? `种子 ${lastState?.seed ?? currentSeed()} · 共 ${records.length} 次`
        : "暂无记录（请先开始模拟）";
      $("dataDialogBody").innerHTML = renderOverflowReflowLog(records);
      $("dataDialogExport").href = "#";
      $("dataDialogExport").style.display = "none";
      $("dataDialog").showModal();
    }

    async function showDataDialog(title, jsonPath, csvPath, renderFn, pickRows) {
      const seed = currentSeed();
      $("dataDialogExport").style.display = "";
      $("dataDialogTitle").textContent = title;
      $("dataDialogMeta").textContent = "加载中…";
      $("dataDialogBody").innerHTML = "";
      $("dataDialogExport").href = csvPath + "?seed=" + seed;
      $("dataDialog").showModal();
      try {
        const res = await fetch(jsonPath + "?seed=" + seed);
        const data = await res.json();
        const rows = pickRows(data);
        const total = data.total ?? rows.length;
        $("dataDialogMeta").textContent = `种子 ${seed} · 共 ${total} 条`;
        $("dataDialogBody").innerHTML = renderFn(rows);
      } catch (e) {
        $("dataDialogMeta").textContent = "加载失败";
        $("dataDialogBody").innerHTML = '<div style="color:var(--red);font-size:12px">' + e + "</div>";
      }
    }

    function updateUI(state) {
      lastState = state;
      if (state.status === "idle" && !state.running) {
        setStatus("idle");
        $("btnStart").disabled = false;
        $("btnPause").disabled = true;
        $("btnResume").disabled = true;
        $("btnStop").disabled = true;
        return;
      }
      if (!state.running && !state.finished) {
        setStatus(state.paused ? "paused" : "idle");
        if (state.input_count != null) {
          $("sInput").textContent = state.input_count;
          const total = state.total_fish || +$("total").value || 1;
          $("sInputHint").textContent = "/ " + total;
          const pct = Math.min(100, (state.input_count / total) * 100);
          $("progressBar").style.width = pct + "%";
          $("progressText").textContent = pct.toFixed(1) + "%";
        }
        $("btnStart").disabled = false;
        $("btnPause").disabled = true;
        $("btnResume").disabled = !!state.paused;
        $("btnStop").disabled = true;
        return;
      }
      if (state.seed != null) $("seed").value = state.seed;
      if (state.total_fish != null) $("total").value = state.total_fish;
      if (state.move_timeout != null) $("moveTimeout").value = state.move_timeout;
      setStatus(state.status);
      $("sTick").textContent = state.tick ?? 0;
      $("sInput").textContent = state.input_count ?? 0;
      $("sInputHint").textContent = "/ " + (state.total_fish ?? 0);
      $("sCartons").textContent = state.cartons ?? 0;
      $("sPacked").textContent = state.packed_fish ?? 0;
      const mt = state.move_timeout ?? ($("moveTimeout").value || 30);
      $("sTickHint").textContent = `秒 · 真实经过时间 · 超时阈值${mt}s`;
      $("sReflow").textContent = state.reflow_count ?? 0;
      $("sReflowHint").textContent = `超时 ${state.timeout_reflow ?? 0} / 超容 ${state.overflow_reflow ?? 0} · 阈值${mt}s`;
      $("sOutside").textContent = state.outside_count ?? 0;
      $("sUnmatched").textContent = state.unmatched_count ?? 0;
      $("sReflowQ").textContent = state.reflow_queue ?? 0;

      const pct = state.total_fish ? Math.min(100, (state.input_count / state.total_fish) * 100) : 0;
      $("progressBar").style.width = pct + "%";
      $("progressText").textContent = pct.toFixed(1) + "%";

      renderModules(state.modules);
      drawChart(state.history);
      renderCartons(state.recent_cartons);

      const evLen = (state.events || []).length;
      if (evLen !== lastEventCount) {
        appendLogs(state.events);
        lastEventCount = evLen;
      }

      const running = state.running;
      const finished = state.finished;
      $("btnStart").disabled = running;
      $("btnPause").disabled = !running || state.paused;
      $("btnResume").disabled = !running || !state.paused;
      $("btnStop").disabled = !running;
      $("btnReportInner").disabled = !finished;
      const reportInner = $("btnReportEmbedInner");
      if (reportInner) reportInner.disabled = !finished;
      if (finished && state.seed) {
        const href = "/api/report?seed=" + state.seed;
        $("btnReport").href = href;
        const reportEmbed = $("btnReportEmbed");
        if (reportEmbed) reportEmbed.href = href;
      }
    }

    async function poll() {
      try {
        const state = await api("/api/state");
        updateUI(state);
      } catch (e) {
        console.error(e);
      }
    }

    function wireTimeoutButtons(btn) {
      if (btn) btn.onclick = () => showTimeoutReflowDialog();
    }

    function wireOverflowButtons(btn) {
      if (btn) btn.onclick = () => showOverflowReflowDialog();
    }

    function wireDataButtons(cartonsBtn, remainingBtn) {
      if (cartonsBtn) {
        cartonsBtn.onclick = () => showDataDialog(
          "成盒数据",
          "/api/cartons",
          "/api/cartons.csv",
          renderCartonRecords,
          d => d.records || []
        );
      }
      if (remainingBtn) {
        remainingBtn.onclick = () => showDataDialog(
          "未成盒尾料",
          "/api/remaining",
          "/api/remaining.csv",
          renderRemainingFish,
          d => d.fish || []
        );
      }
    }

    if (!EMBED) {
      $("btnStart").onclick = async () => {
        const cur = await api("/api/state");
        if (cur.running) {
          updateUI(cur);
          return;
        }
        $("logBox").innerHTML = "";
        lastEventCount = 0;
        seenEventKeys = new Set();
      const cfg = await api("/api/config");
      let enabledSpecs = cfg.default_enabled_specs;
      try {
        const saved = sessionStorage.getItem("enabled_specs");
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length) enabledSpecs = parsed;
        }
      } catch (_) {}
      const body = {
        seed: +$("seed").value,
        total: +$("total").value,
        move_timeout: +$("moveTimeout").value,
        speed: +$("speed").value,
        enabled_specs: enabledSpecs,
      };
        $("btnReport").href = "/api/report?seed=" + body.seed;
        const res = await api("/api/start", body);
        if (!res.ok) { alert(res.error || "启动失败"); return; }
        updateUI(res.state);
      };

      $("btnPause").onclick = () => api("/api/pause").then(r => updateUI(r.state));
      $("btnResume").onclick = () => api("/api/resume").then(r => updateUI(r.state));
      $("btnStop").onclick = () => api("/api/stop").then(r => updateUI(r.state));
    }

    wireDataButtons($("btnViewCartons"), $("btnViewRemaining"));
    wireDataButtons($("btnViewCartonsEmbed"), $("btnViewRemainingEmbed"));
    wireTimeoutButtons($("btnViewTimeout"));
    wireTimeoutButtons($("btnViewTimeoutEmbed"));
    wireOverflowButtons($("btnViewOverflow"));
    wireOverflowButtons($("btnViewOverflowEmbed"));
    $("dataDialogClose").onclick = () => $("dataDialog").close();

    api("/api/config").then(cfg => {
      $("seed").value = cfg.default_seed;
      $("total").value = cfg.default_total;
      $("moveTimeout").value = cfg.default_move_timeout;
    });
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(poll, 200);
    poll();
  </script>
</body>
</html>
